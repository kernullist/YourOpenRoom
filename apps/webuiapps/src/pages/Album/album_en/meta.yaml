app_id: 8
app_name: album
app_display_name: Album
version: '1.0.0'
description: >
  Album app for browsing a selected local photo folder, with legacy image metadata support under
  images/. Only supports REFRESH action to notify frontend to re-sync image list, no write actions.
displayDesc: >
  A local photo gallery with folder selection, search, sort, grid density, and full-size preview.

# ============================================================
# The following actions are only for Agent → Frontend command dispatch.
# After the Agent changes Album app-storage metadata or config, it can dispatch REFRESH to notify the frontend to re-sync.
# ============================================================

actions:
  - type: REFRESH
    name: Refresh Album
    description: >
      After the Agent has changed Album metadata or configuration, this action is dispatched to
      notify the frontend to re-sync and refresh the list. Upon receiving it, the frontend reloads
      the selected local folder source and any legacy image metadata under /images.
    params: []
