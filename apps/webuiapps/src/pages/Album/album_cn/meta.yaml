app_id: 8
app_name: album
app_display_name: 相册
version: '1.0.0'
description: >
  相册应用，用于浏览用户选择的本地照片文件夹，同时兼容 images/ 下的旧版图片元数据。 仅支持 REFRESH
  指令通知前端重新同步图片列表，无写入类 Action。
displayDesc: >
  本地照片图库，支持文件夹选择、搜索、排序、网格密度和大图预览。

# ============================================================
# 以下 actions 仅用于 Agent → 前端 的指令下发。
# Agent 修改相册应用存储或配置后，可下发 REFRESH 通知前端重新同步。
# ============================================================

actions:
  - type: REFRESH
    name: 刷新相册
    description: >
      Agent 修改相册元数据或配置后，下发此 action 通知前端重新同步并刷新列表。
      前端收到后重新加载已选择的本地文件夹来源，以及 /images 下的旧版图片元数据。
    params: []
