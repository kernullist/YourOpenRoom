app_id: 15
app_name: calendar
app_display_name: Calendar
version: '1.0.0'
description: >
  Calendar app. Events are stored as individual JSON files in events/, and state.json stores the
  selected event and selected date. Supports event CRUD sync actions so the Agent can write files
  first, then notify the frontend to refresh.
displayDesc: >
  A focused schedule manager with month navigation, selected-day planning, and character reminders
  before each event.

actions:
  - type: CREATE_EVENT
    name: Create Event
    description: >
      After the Agent writes a new event JSON file to /events/{id}.json, dispatch this action so the
      frontend refreshes.
    params:
      - name: filePath
        type: string
        description: The event file path, e.g. /events/my-event.json
        required: true
      - name: focusId
        type: string
        description: Event ID to focus after refresh
        required: false

  - type: UPDATE_EVENT
    name: Update Event
    description: >
      After the Agent updates an event JSON file, dispatch this action so the frontend refreshes.
    params:
      - name: filePath
        type: string
        description: The updated event file path
        required: true
      - name: focusId
        type: string
        description: Event ID to focus after refresh
        required: false

  - type: DELETE_EVENT
    name: Delete Event
    description: >
      After the Agent deletes an event file, dispatch this action so the frontend refreshes.
    params:
      - name: eventId
        type: string
        description: Event ID that was deleted
        required: true

  - type: REFRESH_EVENTS
    name: Refresh Events
    description: >
      Reload the event list and optional focused event from storage.
    params:
      - name: focusId
        type: string
        description: Event ID to focus after refresh
        required: false
