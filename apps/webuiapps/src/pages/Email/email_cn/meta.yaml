app_id: 11
app_name: email
app_display_name: Email
version: "2.0.0"
description: >
  基于 Gmail 的真实邮件客户端。前端读取 emails/ 下的缓存 JSON 文件，Gmail OAuth、同步、发送、
  草稿、已读、加星、归档、回收站等操作通过前端调用 Gmail bridge API 完成。
displayDesc: >
  一个真正连接 Gmail 的邮件应用，支持收件箱同步、写信、草稿、回复、加星、归档和回收站。

actions:
  - type: SYNC_EMAIL
    name: 同步邮件
    description: >
      触发 Gmail 同步，让 Email 应用从已连接的 Gmail 账号刷新本地缓存。
    params:
      - name: focusId
        type: string
        description: 同步后可选聚焦的邮件 ID。
        required: false
      - name: folder
        type: string
        description: 同步后可选打开的文件夹。
        required: false
        enum: [inbox, sent, drafts, trash]

  - type: SEND_EMAIL
    name: 发送邮件
    description: >
      通过已连接的 Gmail 账号发送真实邮件，然后刷新 Email 应用缓存。
    params:
      - name: to
        type: string
        description: 逗号分隔的收件人。
        required: true
      - name: cc
        type: string
        description: 可选的抄送列表。
        required: false
      - name: subject
        type: string
        description: 邮件主题。
        required: false
      - name: content
        type: string
        description: 纯文本正文。
        required: true
      - name: threadId
        type: string
        description: 回复时可选的 Gmail thread ID。
        required: false
      - name: internetMessageId
        type: string
        description: 回复时可选的 In-Reply-To 头。
        required: false
      - name: references
        type: string
        description: 回复时可选的 References 头。
        required: false
      - name: draftId
        type: string
        description: 可选的 Gmail 草稿 ID，表示更新后发送。
        required: false

  - type: SAVE_DRAFT
    name: 保存草稿
    description: >
      通过已连接的 Gmail 账号创建或更新真实草稿。
    params:
      - name: to
        type: string
        description: 可选的收件人列表。
        required: false
      - name: cc
        type: string
        description: 可选的抄送列表。
        required: false
      - name: subject
        type: string
        description: 邮件主题。
        required: false
      - name: content
        type: string
        description: 草稿正文。
        required: true
      - name: threadId
        type: string
        description: 回复草稿时可选的 Gmail thread ID。
        required: false
      - name: internetMessageId
        type: string
        description: 可选的 In-Reply-To 头。
        required: false
      - name: references
        type: string
        description: 可选的 References 头。
        required: false
      - name: draftId
        type: string
        description: 可选的 Gmail 草稿 ID，用于更新已有草稿。
        required: false

  - type: MARK_READ
    name: 标记已读
    description: >
      从 Gmail 邮件上移除 UNREAD 标签，并刷新该缓存记录。
    params:
      - name: emailId
        type: string
        description: 要标记已读的 Gmail message ID。
        required: true

  - type: STAR_EMAIL
    name: 加星
    description: >
      为 Gmail 邮件添加 STARRED 标签。
    params:
      - name: emailId
        type: string
        description: 要加星的 Gmail message ID。
        required: true

  - type: UNSTAR_EMAIL
    name: 取消加星
    description: >
      从 Gmail 邮件移除 STARRED 标签。
    params:
      - name: emailId
        type: string
        description: 要取消加星的 Gmail message ID。
        required: true

  - type: TRASH_EMAIL
    name: 移入回收站
    description: >
      把邮件移入 Gmail 回收站，并刷新 Email 应用缓存。
    params:
      - name: emailId
        type: string
        description: 要移入回收站的 Gmail message ID。
        required: true
