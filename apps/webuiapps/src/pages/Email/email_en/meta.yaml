app_id: 11
app_name: email
app_display_name: Email
version: "2.0.0"
description: >
  Gmail-backed email client. The frontend reads cached email JSON files under emails/, while Gmail OAuth,
  sync, send, draft, read-state, star, archive, and trash operations are performed through the frontend's
  Gmail bridge APIs.
displayDesc: >
  A real Gmail-connected mail client with inbox sync, compose, drafts, reply, starring, archive, and trash.

actions:
  - type: SYNC_EMAIL
    name: Sync Email
    description: >
      Trigger a Gmail sync through the Email app so the local cache refreshes from the connected Gmail account.
    params:
      - name: focusId
        type: string
        description: Optional email ID to focus after sync.
        required: false
      - name: folder
        type: string
        description: Optional folder to open after sync.
        required: false
        enum: [inbox, sent, drafts, trash]

  - type: SEND_EMAIL
    name: Send Email
    description: >
      Send a real Gmail message through the connected account, then refresh the Email app cache.
    params:
      - name: to
        type: string
        description: Comma-separated To recipients.
        required: true
      - name: cc
        type: string
        description: Optional comma-separated Cc recipients.
        required: false
      - name: subject
        type: string
        description: Subject line.
        required: false
      - name: content
        type: string
        description: Plain-text message body.
        required: true
      - name: threadId
        type: string
        description: Optional Gmail thread ID for replies.
        required: false
      - name: internetMessageId
        type: string
        description: Optional In-Reply-To message ID header when replying.
        required: false
      - name: references
        type: string
        description: Optional References header when replying.
        required: false
      - name: draftId
        type: string
        description: Optional Gmail draft ID to update and send.
        required: false

  - type: SAVE_DRAFT
    name: Save Draft
    description: >
      Create or update a real Gmail draft through the connected account.
    params:
      - name: to
        type: string
        description: Optional comma-separated To recipients.
        required: false
      - name: cc
        type: string
        description: Optional comma-separated Cc recipients.
        required: false
      - name: subject
        type: string
        description: Subject line.
        required: false
      - name: content
        type: string
        description: Plain-text draft body.
        required: true
      - name: threadId
        type: string
        description: Optional Gmail thread ID for reply drafts.
        required: false
      - name: internetMessageId
        type: string
        description: Optional In-Reply-To message ID header.
        required: false
      - name: references
        type: string
        description: Optional References header.
        required: false
      - name: draftId
        type: string
        description: Optional Gmail draft ID to update.
        required: false

  - type: MARK_READ
    name: Mark as Read
    description: >
      Remove the UNREAD label from an email in Gmail and refresh that cached record.
    params:
      - name: emailId
        type: string
        description: Gmail message ID to mark as read.
        required: true

  - type: STAR_EMAIL
    name: Star Email
    description: >
      Add the STARRED label to an email in Gmail.
    params:
      - name: emailId
        type: string
        description: Gmail message ID to star.
        required: true

  - type: UNSTAR_EMAIL
    name: Unstar Email
    description: >
      Remove the STARRED label from an email in Gmail.
    params:
      - name: emailId
        type: string
        description: Gmail message ID to unstar.
        required: true

  - type: TRASH_EMAIL
    name: Trash Email
    description: >
      Move an email into Gmail Trash and refresh the Email app cache.
    params:
      - name: emailId
        type: string
        description: Gmail message ID to move to trash.
        required: true
