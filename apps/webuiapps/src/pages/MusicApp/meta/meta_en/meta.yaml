app_id: 3
app_name: youtube
app_display_name: YouTube
version: "1.0.0"
description: >
  YouTube launcher app. It stores recent searches and saved topics in state.json, and can open
  YouTube searches directly inside the app workflow. This metadata defines Agent → Frontend actions.
displayDesc: >
  A fast YouTube search launcher for opening artist, song, and topic searches with one action.

actions:
  - type: OPEN_SEARCH
    name: Open Search
    description: >
      Search YouTube for a keyword, artist, song, or topic. The app updates the search state and opens the result view.
    params:
      - name: query
        type: string
        description: Search query, for example "IVE I AM"
        required: true

  - type: OPEN_HOME
    name: Open Home
    description: >
      Open the YouTube home page from inside the app.
    params: []

  - type: OPEN_VIDEO
    name: Open Video
    description: >
      Open a specific YouTube watch URL or video directly inside the app player popup.
    params:
      - name: url
        type: string
        description: Full YouTube video URL, for example "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
        required: true
